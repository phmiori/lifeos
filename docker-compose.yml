version: '3.9'

services:

  db:
    image: postgres:16-alpine
    container_name: lifeos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lifeos}
      POSTGRES_USER: ${POSTGRES_USER:-lifeos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifeos_user} -d ${POSTGRES_DB:-lifeos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifeos_backend
    restart: unless-stopped
    environment:
      APP_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-lifeos}
      DB_USER: ${POSTGRES_USER:-lifeos_user}
      DB_PASS: ${POSTGRES_PASSWORD:-changeme}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-lifeos-internal-secret-dev}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@gmail.com}
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./backend:/var/www/html
      - uploads_storage:/var/www/storage
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_storage:
